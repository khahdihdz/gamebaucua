services:
  # ─── API Server ──────────────────────────────────────────────
  - type: web
    name: baucua-api
    runtime: node
    region: singapore
    plan: starter  # Upgrade to standard for production
    buildCommand: "yarn install && yarn workspace @baucua/api build || true"
    startCommand: "node apps/api/src/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SEPAY_SECRET
        sync: false
      - key: SEPAY_BANK_CODE
        sync: false
      - key: SEPAY_ACCOUNT_NUMBER
        sync: false
      - key: SEPAY_ACCOUNT_NAME
        sync: false
      - key: WEB_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: API_URL
        sync: false
    autoDeploy: true
